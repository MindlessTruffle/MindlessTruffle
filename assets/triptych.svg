<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Three focus areas</title>
  <desc id="desc">Minimal light mode cards for game design, Roblox gamedev, and AI programming.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#18191b" flood-opacity="0.07"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f7f2"/>
      <stop offset="1" stop-color="#efede4"/>
    </linearGradient>
    <linearGradient id="lime2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dbff72"/>
      <stop offset="1" stop-color="#b9ec49"/>
    </linearGradient>
    <linearGradient id="blue2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#95a5ff"/>
      <stop offset="1" stop-color="#7688ff"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="420" rx="30" fill="url(#bg)"/>

  <g transform="translate(38 35)" filter="url(#shadow)">
    <rect width="410" height="350" rx="28" fill="#ffffff" stroke="#1b1c1d" stroke-width="1.5"/>
    <text x="28" y="42" fill="#1b1c1d" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" letter-spacing="2.2">01 / GAME DESIGN</text>
    <text x="28" y="92" fill="#1b1c1d" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="780" letter-spacing="-1.8">PLAYABLE</text>
    <text x="28" y="136" fill="#1b1c1d" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="780" letter-spacing="-1.8">WORLDS</text>
    <text x="30" y="172" fill="#6b6e70" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">mechanics / feel / surprise</text>

    <g transform="translate(46 212)" stroke="#1b1c1d" stroke-width="2" stroke-linejoin="round">
      <path d="M18 44 108 -6l90 50-90 52z" fill="#f3f0e7"/>
      <path d="M18 44v38l90 52V96z" fill="#e5dfd1"/>
      <path d="M198 44v38l-90 52V96z" fill="#d6cfbf"/>
      <path d="M72 14 108 -6l36 20-36 20z" fill="url(#lime2)"/>
      <circle cx="216" cy="18" r="18" fill="#ff8c69"/>
      <path d="M216 0V-26" fill="none"/>
      <path d="m216-26-10 16h20z" fill="#1b1c1d"/>
      <rect x="74" y="56" width="16" height="30" rx="4" fill="#1b1c1d"/>
      <rect x="93" y="51" width="23" height="35" rx="5" fill="#1b1c1d"/>
      <path d="M265 8h62M265 22h36M265 36h48" fill="none"/>
    </g>
  </g>

  <g transform="translate(495 35)" filter="url(#shadow)">
    <rect width="410" height="350" rx="28" fill="#ffffff" stroke="#1b1c1d" stroke-width="1.5"/>
    <text x="28" y="42" fill="#1b1c1d" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" letter-spacing="2.2">02 / ROBLOX GAMEDEV</text>
    <text x="28" y="92" fill="#1b1c1d" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="780" letter-spacing="-1.8">LIVE</text>
    <text x="28" y="136" fill="#1b1c1d" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="780" letter-spacing="-1.8">SYSTEMS</text>
    <text x="30" y="172" fill="#6b6e70" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">luau / ux / progression</text>

    <g transform="translate(44 208)" stroke="#1b1c1d" stroke-width="2" fill="#fff">
      <rect x="0" y="0" width="88" height="58" rx="16" fill="#f3f0e7"/>
      <rect x="120" y="68" width="88" height="58" rx="16" fill="url(#lime2)"/>
      <rect x="240" y="0" width="88" height="58" rx="16" fill="#f3f0e7"/>
      <path d="M88 29h32v68M208 97h32V58" fill="none"/>
      <circle cx="120" cy="29" r="10" fill="url(#blue2)"/>
      <circle cx="240" cy="97" r="10" fill="#ff8c69"/>
      <path d="M22 22h44M22 35h28M142 90h44M142 103h28M262 22h44M262 35h32" fill="none"/>
      <rect x="144" y="140" width="40" height="40" transform="rotate(12 164 160)" fill="#1b1c1d"/>
      <rect x="158" y="154" width="12" height="12" transform="rotate(12 164 160)" fill="#ffffff"/>
    </g>
  </g>

  <g transform="translate(952 35)" filter="url(#shadow)">
    <rect width="410" height="350" rx="28" fill="#ffffff" stroke="#1b1c1d" stroke-width="1.5"/>
    <text x="28" y="42" fill="#1b1c1d" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" letter-spacing="2.2">03 / AI PROGRAMMING</text>
    <text x="28" y="92" fill="#1b1c1d" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="780" letter-spacing="-1.8">CURIOUS</text>
    <text x="28" y="136" fill="#1b1c1d" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="780" letter-spacing="-1.8">MACHINES</text>
    <text x="30" y="172" fill="#6b6e70" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">agents / models / tools</text>

    <g transform="translate(74 204)" stroke="#1b1c1d" stroke-width="1.9" fill="none">
      <path d="M130 0 238 62 238 188 130 250 22 188 22 62z"/>
      <path d="M130 0V250M22 62l216 126M238 62 22 188"/>
      <path d="M22 62l108 63 108-63M22 188l108-63 108 63"/>
    </g>
    <g transform="translate(74 204)" stroke="#1b1c1d" stroke-width="1.5">
      <circle cx="130" cy="0" r="12" fill="url(#blue2)"/>
      <circle cx="238" cy="62" r="12" fill="#fff"/>
      <circle cx="238" cy="188" r="12" fill="#ff8c69"/>
      <circle cx="130" cy="250" r="12" fill="#fff"/>
      <circle cx="22" cy="188" r="12" fill="url(#lime2)"/>
      <circle cx="22" cy="62" r="12" fill="#fff"/>
      <circle cx="130" cy="125" r="18" fill="#1b1c1d"/>
    </g>
  </g>
</svg>
