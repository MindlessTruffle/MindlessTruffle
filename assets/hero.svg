    <text x="0" y="46" fill="#151617" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="760" letter-spacing="-3">SAMMY</text>
    <text x="0" y="120" fill="#151617" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="760" letter-spacing="-3">HAWARI</text>
    <text x="2" y="162" fill="#676a6c" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="3.1">GAME DESIGNER / ROBLOX GAMEDEV / AI PROGRAMMER</text>

    <g transform="translate(0 214)" font-family="Inter, Arial, sans-serif" font-weight="760" font-size="44" letter-spacing="-1.5">
