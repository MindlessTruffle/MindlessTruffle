        <rect x="0" y="102" width="42" height="28" rx="8" fill="#f3f0e7"/>
        <path d="M42 14H60V64M60 64H42M42 116H60" fill="none"/>
        <circle cx="60" cy="14" r="7" fill="url(#blue)"/>
        <circle cx="60" cy="116" r="7" fill="#ff8c69"/>
        <path d="M10 10h22M10 18h12M70 60h22M70 68h12M10 112h22M10 120h15" fill="none"/>
