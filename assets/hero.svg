      <text x="162" y="0" fill="#1b1c1d">×</text>
      <text x="222" y="0" fill="#1b1c1d">SYSTEMS</text>
      <text x="506" y="0" fill="#1b1c1d">×</text>
      <text x="566" y="0" fill="#1b1c1d">INTELLIGENCE</text>
    </g>

    <g transform="translate(0 274)" fill="#5c6063" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="540">
      <text x="0" y="0">minimal worlds. game feel. live systems. curious machines.</text>
    </g>
  </g>

