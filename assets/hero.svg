<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="540" viewBox="0 0 1400 540" role="img" aria-labelledby="title desc">
  <title id="title">Sammy Hawari</title>
  <desc id="desc">Light mode portfolio hero for a game designer, Roblox gamedev, and AI programmer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f7f2"/>
      <stop offset="1" stop-color="#efede4"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f3eb"/>
    </linearGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dbff72"/>
      <stop offset="1" stop-color="#b9ec49"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#95a5ff"/>
      <stop offset="1" stop-color="#7688ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#18191b" flood-opacity="0.08"/>
    </filter>
    <pattern id="microGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#e2dfd4" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="540" rx="34" fill="url(#bg)"/>
  <rect x="24" y="24" width="1352" height="492" rx="28" fill="none" stroke="#1b1c1d" stroke-width="1.5"/>

  <g transform="translate(66 68)">
