      <text x="20" y="34" fill="#1b1c1d" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="760">ROBLOX</text>
      <text x="20" y="62" fill="#6a6e70" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">GAME SYSTEMS</text>
